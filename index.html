<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0ea5e9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Trialectique"/>
<title>Trialectique — Sujet Objet Projet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#0ea5e9;--sky-dark:#0284c7;--sky-deeper:#0369a1;
  --sky-light:#e0f2fe;--sky-mid:#bae6fd;--sky-soft:#f0f9ff;
  --bg:#f0f9ff;--card:#fff;--card2:#f8fafc;
  --text:#0c4a6e;--text2:#0369a1;--text3:#64748b;
  --border:#bae6fd;--border2:#7dd3fc;
  --green:#059669;--red:#dc2626;--orange:#d97706;--purple:#7c3aed;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:16px}
.app{max-width:600px;margin:0 auto;padding:20px 16px 40px;min-height:100vh}
h1{font-size:1.6rem;font-weight:800;text-align:center;color:var(--sky-deeper);margin-bottom:4px}
h2{font-size:1.15rem;font-weight:700;color:var(--sky-deeper);margin-bottom:8px}
.sub{color:var(--text3);font-size:.875rem;margin-bottom:12px;line-height:1.5}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card2{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s;display:block;text-align:center}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--sky),var(--sky-deeper));color:#fff;box-shadow:0 4px 14px rgba(14,165,233,.3)}
.btn-secondary{background:var(--card);color:var(--sky-deeper);border:1.5px solid var(--border2)}
.btn-secondary:hover{background:var(--sky-light)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca;font-size:.875rem}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn-sm{padding:8px 16px;font-size:.8rem;border-radius:12px;border:1.5px solid var(--border2);background:var(--card);color:var(--sky-deeper);cursor:pointer;font-weight:600}
.btn-add{background:var(--sky);color:#fff;border:none;border-radius:12px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:.875rem;white-space:nowrap}
textarea{width:100%;background:var(--sky-soft);border:1.5px solid var(--border);border-radius:14px;padding:14px;color:var(--text);font-size:1rem;resize:none;outline:none;font-family:inherit;line-height:1.6;transition:.15s}
textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
input[type=range]{width:100%;accent-color:var(--sky);margin:10px 0}
.text-input{width:100%;background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;font-family:inherit;transition:.15s}
.text-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;margin:3px;border:1.5px solid var(--border);font-weight:600;transition:.15s}
.tag-off{background:var(--card);color:var(--text2)}
.tag-off:hover{background:var(--sky-light);border-color:var(--sky)}
.tag-on{background:var(--sky);color:#fff;border-color:var(--sky)}
.progress-wrap{margin-bottom:18px}
.progress-header{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.progress-bar{background:var(--sky-mid);border-radius:99px;height:8px;overflow:hidden}
.progress-fill{height:8px;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--sky-deeper));transition:width .4s ease}
.ai-box{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #93c5fd;border-radius:14px;padding:14px;margin-bottom:14px;font-size:.875rem}
.ai-label{font-size:.7rem;color:#1d4ed8;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ai-text{color:#1e3a5f;white-space:pre-wrap;line-height:1.6}
.ai-use{background:none;border:none;color:#2563eb;font-size:.75rem;text-decoration:underline;cursor:pointer;margin-top:6px;font-weight:600}
.nav-row{display:flex;gap:12px;margin-top:20px}
.nav-row .btn{flex:1}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px;text-align:center}
.stat-val{font-size:1.6rem;font-weight:800}
.record-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.record-card:hover{border-color:var(--sky);background:var(--sky-soft)}
.record-date{font-size:.75rem;color:var(--text3);margin-bottom:4px;font-weight:600}
.record-pensee{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.record-meta{font-size:.8rem;color:var(--text2);margin-top:6px}
.home-btn{width:100%;padding:18px 20px;border-radius:18px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:12px;text-align:left;display:flex;align-items:center;gap:12px;transition:.15s;border:none}
.home-btn:hover{transform:translateY(-1px)}
.home-btn-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.section-title{font-size:.85rem;font-weight:700;margin:16px 0 8px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.api-input{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;color:var(--text);width:100%;font-size:.9rem;outline:none;margin-bottom:8px;font-family:inherit}
.back-btn{background:none;border:none;color:var(--text2);font-size:.875rem;cursor:pointer;margin-bottom:18px;display:flex;align-items:center;gap:6px;font-weight:600;padding:0}
.italic{font-style:italic;color:var(--text2)}
.wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.label{font-size:.8rem;color:var(--text2);margin-bottom:6px;display:block;font-weight:600}
.strong{color:var(--sky-deeper);font-weight:700}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.green{color:var(--green)}.orange{color:var(--orange)}.red{color:var(--red)}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700}
.badge-blue{background:var(--sky-light);color:var(--sky-deeper)}
.badge-green{background:#d1fae5;color:#065f46}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-orange{background:#fef3c7;color:#92400e}
.divider{height:1px;background:var(--border);margin:16px 0}
.norme-card{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.norme-card:hover{border-color:var(--sky);background:var(--sky-light)}
.norme-hint{font-size:.7rem;color:var(--sky);margin-top:4px;font-weight:600}
.header-badge{background:linear-gradient(135deg,var(--sky-light),var(--sky-mid));border-radius:16px;padding:16px;text-align:center;margin-bottom:24px;border:1.5px solid var(--border)}
.suggest-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;display:flex;align-items:flex-start;gap:10px}
.suggest-item:hover{border-color:var(--sky);background:var(--sky-soft)}
.suggest-item.selected{border-color:var(--sky);background:var(--sky-light)}
.suggest-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;margin-top:2px}
.suggest-check.on{background:var(--sky);border-color:var(--sky);color:#fff}
.dash-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px}
.dash-stat{background:linear-gradient(135deg,var(--sky-soft),var(--sky-light));border:1.5px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.dash-stat-val{font-size:2rem;font-weight:800;color:var(--sky-deeper)}
.dash-stat-label{font-size:.75rem;color:var(--text3);font-weight:600;margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:.75rem;color:var(--text2);width:120px;flex-shrink:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--sky-mid);border-radius:99px;height:10px;overflow:hidden}
.bar-fill{height:10px;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--sky-deeper));transition:width .5s ease}
.bar-count{font-size:.75rem;color:var(--text3);width:24px;text-align:right;font-weight:700}
.insight-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #93c5fd;border-radius:14px;padding:14px;margin-bottom:10px}
.insight-text{font-size:.875rem;color:#1e3a5f;line-height:1.5}
.timeline-item{display:flex;gap:12px;margin-bottom:14px}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--sky);flex-shrink:0;margin-top:5px}
.timeline-content{flex:1}
.emotion-pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700;margin:2px;background:var(--sky-light);color:var(--sky-deeper)}

/* ===== TRACKER STYLES ===== */
.tracker-tabs{display:flex;gap:8px;margin-bottom:14px}
.tracker-tab{flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--border);font-weight:700;font-size:.875rem;cursor:pointer;transition:.15s}
.tracker-tab-on{background:var(--sky-deeper);color:#fff;border-color:var(--sky-deeper)}
.tracker-tab-off{background:var(--card);color:var(--sky-deeper)}
.nav-month{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;margin-bottom:12px}
.nav-btn{background:var(--sky-light);border:none;border-radius:10px;padding:6px 14px;font-weight:700;color:var(--sky-deeper);cursor:pointer;font-size:1rem}
.nav-label{font-weight:800;color:var(--sky-deeper);font-size:1rem}
.stats-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card-mini{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center}
.stat-val-mid{font-size:1.3rem;font-weight:800}
.stat-label-sm{font-size:.68rem;color:var(--text3);font-weight:600}
.table-wrap{overflow-x:auto;border-radius:16px;border:1.5px solid var(--border);background:var(--card);margin-bottom:10px}
table{border-collapse:collapse;width:100%}
thead tr{background:linear-gradient(135deg,var(--sky-deeper),var(--sky))}
th{padding:8px 2px;text-align:center;color:#fff;font-size:.7rem;font-weight:600;min-width:28px}
th.habit-col{text-align:left;padding:10px 12px;min-width:160px;position:sticky;left:0;background:var(--sky-deeper);z-index:2}
th.score-col{min-width:56px}
td.habit-col{padding:7px 12px;font-weight:600;font-size:.78rem;color:var(--text);position:sticky;left:0;z-index:1;border-right:1.5px solid var(--border);white-space:nowrap}
td.score-col{padding:4px 8px;text-align:center}
td.day-cell{text-align:center;padding:3px 2px}
tr.even td.habit-col{background:var(--sky-soft)}
tr.odd td.habit-col{background:var(--card)}
tr.even{background:var(--sky-soft)}
tr.odd{background:var(--card)}
tr.footer-row{background:var(--sky-light);border-top:2px solid var(--border)}
tr.footer-row td.habit-col{background:var(--sky-light);font-weight:700;font-size:.78rem;color:var(--sky-deeper)}
.check-btn{width:24px;height:24px;border-radius:7px;border:none;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:.15s;font-size:.65rem;font-weight:900;color:#fff}
.check-on{background:var(--sky);cursor:pointer}
.check-off{background:var(--sky-light);cursor:pointer}
.check-future{background:#f8fafc;cursor:default;opacity:.25}
td.today-col{background:var(--sky-light)}
th.today-col{background:var(--sky-deeper)!important;font-weight:900}
.score-mini{font-size:.72rem;font-weight:700}
.score-bar-mini{background:var(--sky-light);border-radius:99px;height:4px;margin-top:2px;overflow:hidden}
.score-bar-fill{height:4px;border-radius:99px}
.hint{text-align:center;color:#94a3b8;font-size:.7rem;margin-top:8px;margin-bottom:16px}

/* ===== CARTOGRAPHIE STYLES ===== */
.carto-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.carto-tab{padding:8px 14px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);transition:.15s;white-space:nowrap}
.carto-tab-on{background:var(--sky);color:#fff;border-color:var(--sky)}
.carto-tab-off{background:var(--card);color:var(--text2)}
.carto-row{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.carto-row:hover{border-color:var(--sky);background:var(--sky-soft)}
.carto-row-title{font-weight:700;color:var(--text);font-size:.9rem;margin-bottom:4px}
.carto-row-meta{font-size:.75rem;color:var(--text2)}
.carto-status{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;margin-left:8px}
.carto-status-review{background:#fef3c7;color:#92400e}
.carto-status-done{background:#d1fae5;color:#065f46}
.carto-status-blank{background:var(--sky-light);color:var(--sky-deeper)}
.carto-detail-field{margin-bottom:12px}
.carto-detail-label{font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.04em}
.carto-detail-value{font-size:.9rem;color:var(--text);line-height:1.6;background:var(--sky-soft);border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.carto-btn-link{background:linear-gradient(135deg,var(--sky),var(--sky-deeper));color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:.8rem;font-weight:700;cursor:pointer;margin-top:8px;display:inline-block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:.75rem;font-weight:700;color:var(--text2)}
.form-input{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:.875rem;outline:none;font-family:inherit;transition:.15s}
.form-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
select.form-input{cursor:pointer}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* ===== PROJETS STYLES ===== */
.projet-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.projet-card:hover{border-color:var(--sky);background:var(--sky-soft)}
.projet-card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.projet-cat-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;margin-bottom:8px}
.projet-title{font-weight:700;color:var(--text);font-size:.95rem;margin-bottom:4px;line-height:1.4}
.projet-desc{font-size:.8rem;color:var(--text3);line-height:1.5;margin-bottom:8px}
.projet-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.projet-statut{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:99px;font-size:.72rem;font-weight:700;cursor:pointer;border:none;transition:.15s}
.statut-encours{background:#dbeafe;color:#1d4ed8}
.statut-pause{background:#fef3c7;color:#92400e}
.statut-termine{background:#d1fae5;color:#065f46}
.statut-todo{background:var(--sky-light);color:var(--sky-deeper)}
.projet-link-badge{font-size:.7rem;color:var(--text3);background:var(--sky-soft);padding:3px 8px;border-radius:99px;border:1px solid var(--border)}
.projet-filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.projet-filter{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);transition:.15s;background:var(--card);color:var(--text2)}
.projet-filter-on{background:var(--sky);color:#fff;border-color:var(--sky)}
.cat-colors{
  "cognitif":"#dbeafe|#1d4ed8",
  "relationnel":"#fce7f3|#9d174d",
  "situation":"#fef3c7|#92400e",
  "construction":"#d1fae5|#065f46",
  "autre":"#ede9fe|#5b21b6"
}
/* ===== HUMEUR & CORRÉLATIONS ===== */
.humeur-btn{width:40px;height:40px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.humeur-btn-on{border-color:var(--sky);background:var(--sky-light);transform:scale(1.1)}
.humeur-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.corr-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.corr-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 12px;background:var(--sky-soft);border-radius:12px;border:1px solid var(--border)}
.corr-label{font-size:.8rem;font-weight:600;color:var(--text);flex:1}
.corr-val{font-size:.9rem;font-weight:800}
.heatmap-cell{width:18px;height:18px;border-radius:4px;display:inline-block;margin:1px;cursor:pointer;transition:.15s}
.heatmap-cell:hover{transform:scale(1.2)}
.week-label{font-size:.65rem;color:var(--text3);width:18px;text-align:center;margin:1px}
</style>
</head>

<script>

const DISTORSION_DATA={

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function storageKey(y,m){return "habits_"+y+"_"+m;}
function pctColor(p){if(p>=80)return "#059669";if(p>=50)return "#d97706";if(p>0)return "#0ea5e9";return "#cbd5e1";}

function loadTrackerMonth(){
  try{const raw=localStorage.getItem(storageKey(state.trackerYear,state.trackerMonth));state.trackerData=raw?JSON.parse(raw):{};} catch(e){state.trackerData={};}
}
function loadAllTrackerData(){
  state.trackerAllData={};
  for(let y=2024;y<=TOD.y+1;y++){for(let mo=0;mo<12;mo++){try{const raw=localStorage.getItem(storageKey(y,mo));if(raw)state.trackerAllData[storageKey(y,mo)]=JSON.parse(raw);}catch(e){}}}
}
function saveTrackerMonth(){localStorage.setItem(storageKey(state.trackerYear,state.trackerMonth),JSON.stringify(state.trackerData));}

function toggleHabit(habit,day){
  const isFuture=state.trackerYear>TOD.y||(state.trackerYear===TOD.y&&state.trackerMonth>TOD.m)||(state.trackerYear===TOD.y&&state.trackerMonth===TOD.m&&day>TOD.d);
  if(isFuture)return;
  const key=habit+"_"+day;
  state.trackerData[key]=!state.trackerData[key];
  saveTrackerMonth();render();
}
function prevTrackerMonth(){if(state.trackerMonth===0){state.trackerYear--;state.trackerMonth=11;}else state.trackerMonth--;loadTrackerMonth();render();}
function nextTrackerMonth(){if(state.trackerMonth===11){state.trackerYear++;state.trackerMonth=0;}else state.trackerMonth++;loadTrackerMonth();render();}
function setTrackerView(v){state.trackerView=v;if(v==="dashboard"||v==="correlations")loadAllTrackerData();render();}

// Humeur helpers
const HUMEUR_EMOJIS=["😭","😢","😟","😕","😐","🙂","😊","😄","😁","🤩"];
const HUMEUR_LABELS=["Terrible","Très mal","Mal","Pas bien","Neutre","Bien","Assez bien","Bien","Très bien","Excellent"];

function humeurKey(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function setHumeur(y,m,d,score){
  const k=humeurKey(y,m,d);
  if(state.humeur[k]?.score===score){delete state.humeur[k];}
  else{state.humeur[k]={score,date:new Date(y,m,d).toISOString()};}
  saveHumeur();render();
}
function getHumeurColor(score){
  if(score>=8)return"#059669";
  if(score>=6)return"#0ea5e9";
  if(score>=4)return"#d97706";
  return"#dc2626";
}

// Correlation computation
function computeCorrelations(){
  loadAllTrackerData();
  // Build day-level data: date -> {habitCount, humeur}
  const days=[];
  const allKeys=new Set([...Object.keys(state.trackerAllData)]);
  allKeys.forEach(mk=>{
    const mdata=state.trackerAllData[mk];
    const parts=mk.split("_");const y=parseInt(parts[1]),mo=parseInt(parts[2]);
    const dmax=daysInMonth(y,mo);
    for(let d=1;d<=dmax;d++){
      // don't include future days
      if(y>TOD.y||(y===TOD.y&&mo>TOD.m)||(y===TOD.y&&mo===TOD.m&&d>TOD.d))continue;
      const hk=humeurKey(y,mo,d);
      const humScore=state.humeur[hk]?.score;
      const habitCount=HABITS.filter(h=>!!mdata[h+"_"+d]).length;
      if(humScore!==undefined){
        days.push({y,mo,d,habitCount,humScore,pct:Math.round(habitCount/HABITS.length*100)});
      }
    }
  });

  // Group by habit bracket: 0-25%, 26-50%, 51-75%, 76-100%
  const brackets=[
    {label:"0–25%",min:0,max:25,days:[],color:"#dc2626"},
    {label:"26–50%",min:26,max:50,days:[],color:"#d97706"},
    {label:"51–75%",min:51,max:75,days:[],color:"#0ea5e9"},
    {label:"76–100%",min:76,max:100,days:[],color:"#059669"},
  ];
  days.forEach(day=>{
    const b=brackets.find(br=>day.pct>=br.min&&day.pct<=br.max);
    if(b)b.days.push(day.humScore);
  });
  brackets.forEach(b=>{b.avgHumeur=b.days.length>0?Math.round(b.days.reduce((a,v)=>a+v,0)/b.days.length*10)/10:null;});

  // Per-habit correlation: days with habit done vs not done → avg humeur
  const habitCorr=HABITS.map(h=>{
    const withHabit=[],withoutHabit=[];
    days.forEach(day=>{
      const mk=storageKey(day.y,day.mo);
      const mdata=state.trackerAllData[mk]||{};
      if(mdata[h+"_"+day.d])withHabit.push(day.humScore);
      else withoutHabit.push(day.humScore);
    });
    const avgWith=withHabit.length>0?Math.round(withHabit.reduce((a,v)=>a+v,0)/withHabit.length*10)/10:null;
    const avgWithout=withoutHabit.length>0?Math.round(withoutHabit.reduce((a,v)=>a+v,0)/withoutHabit.length*10)/10:null;
    const impact=avgWith!==null&&avgWithout!==null?Math.round((avgWith-avgWithout)*10)/10:null;
    return{habit:h,avgWith,avgWithout,impact,n:withHabit.length};
  }).filter(h=>h.impact!==null&&h.n>=3).sort((a,b)=>Math.abs(b.impact)-Math.abs(a.impact));

  // TCC sessions correlation with previous week habits
  const tccCorr=[];
  state.records.forEach(r=>{
    const d=new Date(r.date);
    // Count habits in the 7 days before this session
    let weekHabits=0,weekPossible=0;
    for(let i=1;i<=7;i++){
      const dd=new Date(d);dd.setDate(dd.getDate()-i);
      const mk=storageKey(dd.getFullYear(),dd.getMonth());
      const mdata=state.trackerAllData[mk]||{};
      HABITS.forEach(h=>{weekPossible++;if(mdata[h+"_"+dd.getDate()])weekHabits++;});
    }
    const weekPct=weekPossible>0?Math.round(weekHabits/weekPossible*100):0;
    const reduction=(r.convictionAvant||0)-(r.convictionApres||0);
    tccCorr.push({weekPct,reduction,convBefore:r.convictionAvant,convAfter:r.convictionApres});
  });

  // Group TCC sessions by discipline level
  const tccBrackets=[
    {label:"Semaine < 40%",min:0,max:39,sessions:[],color:"#dc2626"},
    {label:"Semaine 40–60%",min:40,max:60,sessions:[],color:"#d97706"},
    {label:"Semaine 61–80%",min:61,max:80,sessions:[],color:"#0ea5e9"},
    {label:"Semaine > 80%",min:81,max:100,sessions:[],color:"#059669"},
  ];
  tccCorr.forEach(s=>{
    const b=tccBrackets.find(br=>s.weekPct>=br.min&&s.weekPct<=br.max);
    if(b)b.sessions.push(s.reduction);
  });
  tccBrackets.forEach(b=>{b.avgReduction=b.sessions.length>0?Math.round(b.sessions.reduce((a,v)=>a+v,0)/b.sessions.length*10)/10:null;b.n=b.sessions.length;});

  return{days,brackets,habitCorr,tccBrackets,total:days.length};
}

function getHabitScore(habit){const days=daysInMonth(state.trackerYear,state.trackerMonth);let count=0;for(let d=1;d<=days;d++){if(state.trackerData[habit+"_"+d])count++;}return count;}
function getDayScore(day){let count=0;HABITS.forEach(h=>{if(state.trackerData[h+"_"+day])count++;});return count;}

function calcDashboard(){
  const habitTotals={},habitPossible={};const monthScores=[];
  HABITS.forEach(h=>{habitTotals[h]=0;habitPossible[h]=0;});
  Object.keys(state.trackerAllData).forEach(key=>{
    const mdata=state.trackerAllData[key];const parts=key.split("_");const y=parseInt(parts[1]),mo=parseInt(parts[2]);
    const d=daysInMonth(y,mo);let monthDone=0;const monthTotal=HABITS.length*d;
    HABITS.forEach(h=>{habitPossible[h]+=d;for(let day=1;day<=d;day++){if(mdata[h+"_"+day]){habitTotals[h]++;monthDone++;}}});
    const pct=Math.round((monthDone/monthTotal)*100);
    monthScores.push({y,mo,pct,done:monthDone,total:monthTotal});
  });
  monthScores.sort((a,b)=>a.y!==b.y?a.y-b.y:a.mo-b.mo);
  const sorted=HABITS.slice().sort((a,b)=>{const pa=habitPossible[a]>0?habitTotals[a]/habitPossible[a]:0;const pb=habitPossible[b]>0?habitTotals[b]/habitPossible[b]:0;return pb-pa;});
  let streak=0;const dd=new Date(TOD.y,TOD.m,TOD.d);
  for(let i=0;i<365;i++){const sy=dd.getFullYear(),sm=dd.getMonth(),sd=dd.getDate();const k=storageKey(sy,sm);const mdata=state.trackerAllData[k]||{};const perfect=HABITS.every(h=>!!mdata[h+"_"+sd]);if(perfect){streak++;dd.setDate(dd.getDate()-1);}else break;}
  return{habitTotals,habitPossible,monthScores,streak,sorted};
}

async function callAI(prompt){
  if(!state.apiKey)throw new Error("no_key");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content?.[0]?.text||"";
}

const CARTE_STR=()=>{const c=state.carte;return `Carte de valeur:\nValeurs: ${c.valeurs.join(", ")}\nForces: ${c.forces.join(", ")}\nRéussites: ${c.reussites.join(" | ")}\nCroyances: ${c.croyances.join(" | ")}\nEngagements: ${c.engagements.join(" | ")}`;};

async function askAI(field){
  state.ai={loading:true,field};render();
  try{
    const f=state.form;let prompt="";
    if(field==="contre"){
      const sel=f.carteSelections||[];
      prompt=`Tu es thérapeute TCC bienveillant.\n${CARTE_STR()}\nÉléments sélectionnés: ${sel.join(" | ")}\nVoix: "${f.pensee}"\nDistorsions: ${f.distorsions.join(", ")}\nNorme: "${f.norme}"\n\nGénère 3 contre-arguments personnalisés puissants basés sur ces éléments. Direct, sans intro.`;
    }else if(field==="ecart"){
      prompt=`Tu es thérapeute TCC. Voix: "${f.pensee}". Norme: "${f.norme}". Contre-arguments: "${f.contrearguments}". Formule en 2-3 phrases l'écart entre la voix et la norme. Précis et direct.`;
    }else if(field==="carto_analyse"){
      const item=state.cartoEdit;
      if(!item)return;
      prompt=`Tu es thérapeute TCC bienveillant et expert en restructuration cognitive.\n${CARTE_STR()}\n\nSituation/déclencheur: "${item.titre}"\nPensée associée: "${item.pensee||'Non précisée'}"\nÉmotions: "${item.emotions||'Non précisées'}"\nComportements: "${item.comportements||'Non précisés'}"\n\nFais une analyse TCC brève et propose:\n1. La ou les distorsions cognitives probables\n2. Une norme objective pour cette situation\n3. Un contre-argument puissant basé sur la carte de valeur de Boris\n4. Une action immédiate concrète (5 min)\n5. Un projet de travail recommandé\n\nRéponds de façon directe, personnelle et bienveillante. Tu parles à Boris.`;
    }
    const result=await callAI(prompt);
    if(field==="contre"){state.form.contreAI=result;}
    else if(field==="ecart"){state.form.ecartAI=result;}
    else if(field==="carto_analyse"){state.cartoAIResult=result;}
  }catch(e){
    if(e.message==="no_key")alert("⚙️ Entre ta clé API dans Paramètres.");
    else alert("Erreur IA : "+e.message);
  }
  state.ai={loading:false,field:null};render();
}

function cartoSave(cat,id){
  const get=sid=>document.getElementById(sid)?.value||"";
  const data={
    titre:get("ce_titre"),pensee:get("ce_pensee"),emotions:get("ce_emotions"),
    comportements:get("ce_comportements"),commentaire:get("ce_commentaire"),statut:get("ce_statut")
  };
  if(!data.titre.trim()){alert("Le titre est obligatoire.");return;}
  if(!state.carto[cat])state.carto[cat]=[];
  if(id){
    const idx=state.carto[cat].findIndex(i=>i.id===id);
    if(idx>=0)state.carto[cat][idx]={...state.carto[cat][idx],...data};
    state.cartoEdit=null;
    state.cartoDetail={cat,id};
  }else{
    const newId=Date.now();
    state.carto[cat].push({id:newId,...data});
    state.cartoEdit=null;
    state.cartoDetail={cat,id:newId};
  }
  saveCarto();render();
}

function cartoAddNew(cat){
  state.cartoEdit={cat,id:null};
  state.cartoAIResult=null;
  render();
}

function cartoDelete(cat,id){
  if(!confirm("Supprimer cette entrée ?"))return;
  state.carto[cat]=state.carto[cat].filter(i=>i.id!==id);
  state.cartoDetail=null;saveCarto();render();
}

function renderTracker(){
  const y=state.trackerYear,m=state.trackerMonth;
  const days=daysInMonth(y,m);
  const DAYS=[];for(let i=1;i<=days;i++)DAYS.push(i);
  const isCurMonth=y===TOD.y&&m===TOD.m;

  let totalDone=0;Object.values(state.trackerData).forEach(v=>{if(v)totalDone++;});
  const totalPossible=HABITS.length*days;
  const monthPct=Math.round((totalDone/totalPossible)*100);
  const todayScore=isCurMonth?getDayScore(TOD.d):0;

  let html="";
  html+=`<div class="nav-month"><button class="nav-btn" onclick="prevTrackerMonth()">‹</button><span class="nav-label">${MONTHS[m]} ${y}</span><button class="nav-btn" onclick="nextTrackerMonth()">›</button></div>`;
  html+=`<div class="stats-grid-3">
<div class="stat-card-mini"><div class="stat-val-mid" style="color:${pctColor(monthPct)}">${totalDone}/${totalPossible}</div><div class="stat-label-sm">Cochées (${monthPct}%)</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--sky-deeper)">${HABITS.length}</div><div class="stat-label-sm">Habitudes</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--orange)">${isCurMonth?todayScore+"/"+HABITS.length:days}</div><div class="stat-label-sm">${isCurMonth?"Aujourd'hui":"Jours"}</div></div>
</div>`;
  html+=`<div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" style="width:${monthPct}%"></div></div>`;
  html+=`<div class="table-wrap"><table><thead><tr><th class="habit-col">Habitude</th>`;
  DAYS.forEach(d=>{const isT=isCurMonth&&d===TOD.d;html+=`<th class="${isT?"today-col":""}">${String(d).padStart(2,"0")}</th>`;});
  html+=`<th class="score-col">Score</th></tr></thead><tbody>`;
  HABITS.forEach((habit,hi)=>{
    const score=getHabitScore(habit);const p=Math.round((score/days)*100);const rowCls=hi%2===0?"even":"odd";
    html+=`<tr class="${rowCls}"><td class="habit-col">${esc(habit)}</td>`;
    DAYS.forEach(d=>{
      const checked=!!state.trackerData[habit+"_"+d];
      const isToday=isCurMonth&&d===TOD.d;
      const isFuture=y>TOD.y||(y===TOD.y&&m>TOD.m)||(y===TOD.y&&m===TOD.m&&d>TOD.d);
      const btnCls=checked?"check-btn check-on":(isFuture?"check-btn check-future":"check-btn check-off");
      html+=`<td class="day-cell${isToday?" today-col":""}"><button class="${btnCls}" onclick="toggleHabit('${habit.replace(/'/g,"\\'").replace(/"/g,"&quot;")}',${d})">${checked?"✓":""}</button></td>`;
    });
    html+=`<td class="score-col"><div class="score-mini" style="color:${pctColor(p)}">${score}/${days}<span style="font-size:.6rem;opacity:.7"> (${p}%)</span></div><div class="score-bar-mini"><div class="score-bar-fill" style="background:${pctColor(p)};width:${p}%"></div></div></td></tr>`;
  });
  html+=`<tr class="footer-row"><td class="habit-col">Score du jour</td>`;
  DAYS.forEach(d=>{const s=getDayScore(d);const p=Math.round((s/HABITS.length)*100);const isToday=isCurMonth&&d===TOD.d;html+=`<td class="day-cell${isToday?" today-col":""}" style="text-align:center"><span class="score-mini" style="color:${pctColor(p)}">${s>0?s:""}</span></td>`;});
  html+=`<td></td></tr>`;

  // Humeur row
  html+=`<tr style="background:#fef9c3;border-top:2px solid #fde047"><td class="habit-col" style="background:#fef9c3;color:#713f12;font-weight:700">😊 Humeur /10</td>`;
  DAYS.forEach(d=>{
    const isFuture=y>TOD.y||(y===TOD.y&&m>TOD.m)||(y===TOD.y&&m===TOD.m&&d>TOD.d);
    const isToday=isCurMonth&&d===TOD.d;
    const hk=humeurKey(y,m,d);
    const score=state.humeur[hk]?.score;
    const emoji=score!==undefined?HUMEUR_EMOJIS[score-1]:"·";
    const color=score!==undefined?getHumeurColor(score):"#cbd5e1";
    html+=`<td class="day-cell${isToday?" today-col":""}" style="text-align:center">`;
    if(!isFuture){
      html+=`<button onclick="showHumeurPicker(${y},${m},${d})" style="background:none;border:none;cursor:pointer;font-size:.9rem;line-height:1;color:${color};width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;border-radius:6px;${score?"background:"+color+"22":""}">${emoji}</button>`;
    }else{html+=`<span style="color:#e2e8f0;font-size:.7rem">·</span>`;}
    html+=`</td>`;
  });
  html+=`<td class="score-col"><div class="score-mini" style="color:#713f12">${(()=>{const scores=DAYS.map(d=>{const hk=humeurKey(y,m,d);return state.humeur[hk]?.score;}).filter(s=>s!==undefined);return scores.length>0?(Math.round(scores.reduce((a,v)=>a+v,0)/scores.length*10)/10)+"/10":"—";})()}</div></td>`;
  html+=`</tr>`;

  html+=`</tbody></table></div>`;
  html+=`<p class="hint">Appuie sur une case habitude pour cocher · Clique 😊 pour noter ton humeur · Navigue avec ‹ ›</p>`;

  // Humeur picker modal
  html+=`<div id="humeurModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
<div style="background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px">
<div style="font-weight:800;color:var(--sky-deeper);margin-bottom:4px;font-size:1rem" id="humeurModalTitle">Comment tu te sens ?</div>
<div style="font-size:.8rem;color:var(--text3);margin-bottom:16px">Appuie sur l'emoji correspondant à ton humeur</div>
<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:16px" id="humeurGrid"></div>
<div style="text-align:center;font-size:.8rem;color:var(--text3)" id="humeurSelLabel"></div>
<button onclick="document.getElementById('humeurModal').style.display='none'" style="width:100%;margin-top:16px;padding:12px;border:none;border-radius:12px;background:var(--sky-light);color:var(--sky-deeper);font-weight:700;cursor:pointer">Fermer</button>
</div></div>`;

  return html;
}

function renderTrackerDashboard(){
  const dash=calcDashboard();
  let totalAllDone=0,totalAllPossible=0;
  HABITS.forEach(h=>{totalAllDone+=dash.habitTotals[h];totalAllPossible+=dash.habitPossible[h];});
  const globalPct=totalAllPossible>0?Math.round((totalAllDone/totalAllPossible)*100):0;

  let html=`<div class="stats-grid-3">
<div class="stat-card-mini"><div class="stat-val-mid" style="color:${pctColor(globalPct)}">${totalAllDone}/${totalAllPossible}</div><div class="stat-label-sm">Cochées (${globalPct}%)</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--sky-deeper)">${HABITS.length}</div><div class="stat-label-sm">Habitudes</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--orange)">${dash.streak}j</div><div class="stat-label-sm">Streak</div></div>
</div>`;

  if(dash.monthScores.length>0){
    html+=`<div class="dash-card"><div class="dash-card-title">📅 Score par mois</div>`;
    dash.monthScores.forEach(ms=>{html+=`<div class="bar-row"><div class="bar-label" style="width:110px">${MONTHS[ms.mo]} ${ms.y}</div><div class="bar-track"><div class="bar-fill" style="background:${pctColor(ms.pct)};width:${ms.pct}%"></div></div><div class="bar-count" style="color:${pctColor(ms.pct)};width:60px">${ms.done}/${ms.total} <span style="font-size:.65rem">(${ms.pct}%)</span></div></div>`;});
    html+=`</div>`;
  }

  html+=`<div class="dash-card"><div class="dash-card-title">💪 Jours pratiqués (total cumulé)</div>`;
  dash.sorted.forEach(h=>{
    const p=dash.habitPossible[h]>0?Math.round((dash.habitTotals[h]/dash.habitPossible[h])*100):0;
    html+=`<div style="margin-bottom:12px">
<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
<div style="font-size:.78rem;font-weight:600;color:var(--text);flex:1;padding-right:8px">${esc(h)}</div>
<div style="font-size:.95rem;font-weight:800;color:${pctColor(p)};white-space:nowrap">${dash.habitTotals[h]} j <span style="font-size:.7rem;font-weight:500;color:var(--text3)">(${p}%)</span></div>
</div>
<div class="bar-track"><div class="bar-fill" style="background:${pctColor(p)};width:${p}%"></div></div>
</div>`;
  });
  html+=`</div>`;

  html+=`<div class="insight-card"><div style="font-weight:700;color:#1d4ed8;margin-bottom:10px;font-size:.9rem">💡 Insights</div>`;
  if(totalAllPossible===0){html+=`<p class="insight-text">Complète des séances pour voir tes insights.</p>`;}
  else{
    if(dash.sorted.length>0){const best=dash.sorted[0];const bestP=dash.habitPossible[best]>0?Math.round((dash.habitTotals[best]/dash.habitPossible[best])*100):0;html+=`<p class="insight-text" style="margin-bottom:8px">🏆 Meilleure habitude : <strong>${esc(best)}</strong> — ${dash.habitTotals[best]} jours (${bestP}%)</p>`;}
    if(dash.sorted.length>1){const worst=dash.sorted[dash.sorted.length-1];const worstP=dash.habitPossible[worst]>0?Math.round((dash.habitTotals[worst]/dash.habitPossible[worst])*100):0;html+=`<p class="insight-text" style="margin-bottom:8px">⚠️ À renforcer : <strong>${esc(worst)}</strong> — ${dash.habitTotals[worst]} jours (${worstP}%)</p>`;}
    if(globalPct>=80)html+=`<p class="insight-text">🔥 ${totalAllDone}/${totalAllPossible} cases cochées (${globalPct}%) — discipline excellente.</p>`;
    if(dash.streak>=7)html+=`<p class="insight-text">⚡ ${dash.streak} jours consécutifs parfaits — discipline réelle.</p>`;
  }
  html+=`</div>`;
  return html;
}

function showHumeurPicker(y,m,d){

  const hk=humeurKey(y,m,d);
  const current=state.humeur[hk]?.score;
  const dateStr=new Date(y,m,d).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  document.getElementById("humeurModalTitle").textContent="Humeur du "+dateStr;
  const grid=document.getElementById("humeurGrid");
  grid.innerHTML=HUMEUR_EMOJIS.map((e,i)=>`

}

function renderCorrelations(){
  const corr=computeCorrelations();

  if(corr.total<5){
    return `<div class="dash-card" style="text-align:center;padding:30px">
<div style="font-size:2rem;margin-bottom:8px">📊</div>
<div style="font-weight:700;color:var(--sky-deeper);margin-bottom:8px">Pas encore assez de données</div>
<p class="sub" style="margin:0">Note ton humeur chaque jour dans le tracker pendant au moins 5 jours pour voir les corrélations.</p>
</div>`;
  }

  let html=``;

  // Humeur vs habitudes bracket chart
  html+=`<div class="dash-card">
<div class="dash-card-title">😊 Humeur moyenne selon le niveau de discipline</div>
<p style="font-size:.78rem;color:var(--text3);margin-bottom:14px">Plus tu coches d'habitudes, comment évolue ton humeur ?</p>`;
  const maxHumeur=Math.max(...corr.brackets.filter(b=>b.avgHumeur!==null).map(b=>b.avgHumeur),1);
  corr.brackets.forEach(b=>{
    if(b.avgHumeur===null){
      html+=`<div class="corr-row"><span class="corr-dot" style="background:#e2e8f0"></span><span class="corr-label">${b.label}</span><span style="font-size:.75rem;color:var(--text3)">Pas assez de données</span></div>`;
      return;
    }
    const barW=Math.round(b.avgHumeur/10*100);
    html+=`<div style="margin-bottom:12px">
<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
<span style="font-size:.8rem;font-weight:700;color:var(--text)">${b.label}</span>
<span style="font-size:1rem;font-weight:800;color:${b.color}">${HUMEUR_EMOJIS[Math.round(b.avgHumeur)-1]} ${b.avgHumeur}/10</span>
</div>
<div class="bar-track"><div class="bar-fill" style="background:${b.color};width:${barW}%"></div></div>
<div style="font-size:.7rem;color:var(--text3);margin-top:3px">${b.days.length} jour(s) avec humeur notée</div>
</div>`;
  });
  html+=`</div>`;

  // Per-habit impact
  if(corr.habitCorr.length>0){
    html+=`<div class="dash-card">
<div class="dash-card-title">💪 Impact de chaque habitude sur l'humeur</div>
<p style="font-size:.78rem;color:var(--text3);margin-bottom:14px">Différence d'humeur moyenne entre les jours où tu pratiques vs les jours où tu ne pratiques pas.</p>`;
    corr.habitCorr.slice(0,8).forEach(h=>{
      const color=h.impact>0?"#059669":h.impact<0?"#dc2626":"#94a3b8";
      const sign=h.impact>0?"+":"";
      html+=`<div style="margin-bottom:12px;padding:10px 12px;background:var(--sky-soft);border-radius:12px;border:1px solid var(--border)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
<span style="font-size:.8rem;font-weight:700;color:var(--text);flex:1;padding-right:8px">${esc(h.habit)}</span>
<span style="font-size:.95rem;font-weight:800;color:${color};white-space:nowrap">${sign}${h.impact} pts</span>
</div>
<div style="display:flex;gap:12px;font-size:.72rem;color:var(--text3)">
<span>✅ Avec : <strong style="color:${color}">${h.avgWith}/10</strong></span>
<span>❌ Sans : <strong style="color:var(--text3)">${h.avgWithout}/10</strong></span>
<span style="color:var(--text3)">(${h.n} jours)</span>
</div>
</div>`;
    });
    html+=`</div>`;
  }

  // TCC × discipline correlation
  if(corr.tccBrackets.some(b=>b.n>0)){
    html+=`<div class="dash-card">
<div class="dash-card-title">🧠 Discipline de la semaine → efficacité TCC</div>

function renderDashboard(){
  const records=state.records;
  if(records.length===0){
    return `<button class="back-btn" onclick="setView('home')">← Retour</button>

  }
  const total=records.length;
  const avgConvBefore=Math.round(records.reduce((a,r)=>a+(r.convictionAvant||0),0)/total);
  const avgConvAfter=Math.round(records.reduce((a,r)=>a+(r.convictionApres||0),0)/total);
  const avgReduction=avgConvBefore-avgConvAfter;
  const lastWeek=records.filter(r=>Date.now()-new Date(r.date)<7*86400000).length;
  const distCount={};records.forEach(r=>(r.distorsions||[]).forEach(d=>{distCount[d]=(distCount[d]||0)+1;}));
  const sortedDist=Object.entries(distCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxDist=sortedDist[0]?.[1]||1;
  const emoCount={};records.forEach(r=>(r.emotions||[]).forEach(e=>{emoCount[e]=(emoCount[e]||0)+1;}));
  const sortedEmo=Object.entries(emoCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const last7=records.slice(0,7);
  const insights=[];
  if(sortedDist[0])insights.push(`Ta distorsion la plus fréquente est <strong>"${sortedDist[0][0]}"</strong> (${sortedDist[0][1]} fois). C'est le pattern principal à travailler.`);
  if(avgReduction>0)insights.push(`En moyenne, ta conviction baisse de <strong>${avgReduction}%</strong> après chaque séance.`);
  if(avgReduction<=0)insights.push(`Ta conviction ne baisse pas encore — approfondis l'étape contre-arguments.`);
  if(sortedEmo[0])insights.push(`L'émotion dominante est <strong>"${sortedEmo[0][0]}"</strong>. Elle mérite un projet de régulation dédié.`);
  if(total>=5&&lastWeek===0)insights.push(`Pas de séance cette semaine. La régularité est clé.`);
  if(lastWeek>=3)insights.push(`${lastWeek} séances cette semaine — excellente régularité.`);

  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>📊 Tableau de bord TCC</h2>
<div class="stat-grid">
<div class="dash-stat"><div class="dash-stat-val">${total}</div><div class="dash-stat-label">Séances totales</div></div>
<div class="dash-stat"><div class="dash-stat-val">${lastWeek}</div><div class="dash-stat-label">Cette semaine</div></div>
<div class="dash-stat"><div class="dash-stat-val">${avgConvBefore}%</div><div class="dash-stat-label">Conviction moy. avant</div></div>
<div class="dash-stat" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#6ee7b7"><div class="dash-stat-val" style="color:#065f46">${avgConvAfter}%</div><div class="dash-stat-label" style="color:#065f46">Conviction moy. après</div></div>
</div>
${avgReduction>0?`<div class="card" style="background:linear-gradient(135deg,#d1fae5,#ecfdf5);border-color:#6ee7b7;text-align:center;padding:14px"><div style="font-size:1.8rem;font-weight:800;color:#065f46">− ${avgReduction}%</div><div style="font-size:.8rem;color:#059669;font-weight:600">Réduction moyenne de la conviction</div></div>`:""}
<div class="dash-card"><h2 style="margin-bottom:12px">🔍 Distorsions les plus fréquentes</h2>
${sortedDist.length===0?`<p class="sub">Pas encore de données.</p>`:sortedDist.map(([d,c])=>`<div class="bar-row"><div class="bar-label">${esc(d)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/maxDist*100)}%"></div></div><div class="bar-count">${c}</div></div>`).join("")}
</div>
<div class="dash-card"><h2 style="margin-bottom:12px">❤️ Émotions les plus fréquentes</h2>
${sortedEmo.length===0?`<p class="sub">Pas encore de données.</p>`:`<div class="wrap">${sortedEmo.map(([e,c])=>`<span class="emotion-pill">${e} <strong>(${c})</strong></span>`).join("")}</div>`}
</div>
<div class="dash-card"><h2 style="margin-bottom:12px">💡 Insights</h2>${insights.map(i=>`<div class="insight-card"><div class="insight-text">${i}</div></div>`).join("")}</div>
<div class="dash-card"><h2 style="margin-bottom:12px">🕐 Dernières séances</h2>
${last7.map(r=>`<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content">
<div style="font-size:.75rem;color:var(--text3);font-weight:600">${new Date(r.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long"})}</div>
<div style="font-size:.875rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.pensee)}</div>
<div style="font-size:.78rem;color:var(--text2);margin-top:2px">${(r.distorsions||[]).map(d=>`<span class="badge badge-blue">${esc(d)}</span>`).join(" ")} ${(r.emotions||[]).map(e=>`<span class="badge badge-purple">${esc(e)}</span>`).join(" ")}</div>
<div style="font-size:.78rem;color:var(--green);margin-top:2px;font-weight:600">Conviction ${r.convictionAvant}% → ${r.convictionApres}%</div>
</div></div>`).join("")}
</div>`;
}

function exportAll(){
  // Collect all tracker data from localStorage
  const trackerKeys={};
  for(let y=2024;y<=TOD.y+2;y++){
    for(let mo=0;mo<12;mo++){
      const k=storageKey(y,mo);
      const raw=localStorage.getItem(k);
      if(raw)trackerKeys[k]=JSON.parse(raw);
    }
  }
  const bundle={
    version:1,
    exportDate:new Date().toISOString(),
    records:state.records,
    carte:state.carte,
    carto:state.carto,
    projets:state.projets,
    humeur:state.humeur,
    tracker:trackerKeys,
  };
  const date=new Date().toISOString().slice(0,10);
  dl(JSON.stringify(bundle,null,2),`trialectique_backup_${date}.json`,"application/json");
}

function importAll(){
  const input=document.getElementById("importFile");
  const file=input?.files?.[0];
  if(!file){alert("Sélectionne un fichier d'abord.");return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const bundle=JSON.parse(e.target.result);
      if(!bundle.version){throw new Error("Format non reconnu.");}
      const merge=confirm(
        `📦 Fichier du ${new Date(bundle.exportDate).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}\n\n`+
        `• ${(bundle.records||[]).length} séance(s) TCC\n`+
        `• ${Object.values(bundle.carte||{}).flat().length} éléments carte de valeur\n`+
        `• ${Object.keys(bundle.tracker||{}).length} mois de tracker\n`+
        `• ${(bundle.projets||[]).length} projets\n\n`+
        `Fusionner avec tes données actuelles ?\n(OK = Fusionner · Annuler = Remplacer)`
      );
      if(merge){
        // MERGE — combine without duplicates
        if(bundle.records){
          const existingIds=new Set(state.records.map(r=>r.id));
          const newRecords=bundle.records.filter(r=>!existingIds.has(r.id));
          state.records=[...state.records,...newRecords].sort((a,b)=>new Date(b.date)-new Date(a.date));
          saveRecords(state.records);
        }
        if(bundle.carte){
          Object.keys(bundle.carte).forEach(k=>{
            if(!state.carte[k])state.carte[k]=[];
            const existing=new Set(state.carte[k]);
            (bundle.carte[k]||[]).forEach(v=>{if(!existing.has(v))state.carte[k].push(v);});
          });
          saveCarte();
        }
        if(bundle.carto){
          Object.keys(bundle.carto).forEach(cat=>{
            if(!state.carto[cat])state.carto[cat]=[];
            const existingIds=new Set(state.carto[cat].map(i=>i.id));
            (bundle.carto[cat]||[]).forEach(item=>{if(!existingIds.has(item.id))state.carto[cat].push(item);});
          });
          saveCarto();
        }
        if(bundle.projets){
          const existingIds=new Set(state.projets.map(p=>p.id));
          const newProjets=bundle.projets.filter(p=>!existingIds.has(p.id));
          state.projets=[...state.projets,...newProjets];
          saveProjets();
        }
        if(bundle.humeur){
          Object.keys(bundle.humeur).forEach(k=>{if(!state.humeur[k])state.humeur[k]=bundle.humeur[k];});
          saveHumeur();
        }
        if(bundle.tracker){
          Object.keys(bundle.tracker).forEach(k=>{
            const existing=JSON.parse(localStorage.getItem(k)||"{}");
            const merged={...bundle.tracker[k],...existing};
            localStorage.setItem(k,JSON.stringify(merged));
          });
        }
        alert("✅ Fusion réussie ! Toutes les données ont été combinées.");
      } else {
        // REPLACE — full overwrite
        if(!confirm("⚠️ Cela va REMPLACER toutes tes données actuelles. Confirmer ?"))return;
        if(bundle.records){state.records=bundle.records;saveRecords(state.records);}
        if(bundle.carte){state.carte=bundle.carte;saveCarte();}
        if(bundle.carto){state.carto=bundle.carto;saveCarto();}
        if(bundle.projets){state.projets=bundle.projets;saveProjets();}
        if(bundle.humeur){state.humeur=bundle.humeur;saveHumeur();}
        if(bundle.tracker){
          // Clear old tracker keys then restore
          for(let y=2024;y<=TOD.y+2;y++){for(let mo=0;mo<12;mo++)localStorage.removeItem(storageKey(y,mo));}
          Object.keys(bundle.tracker).forEach(k=>localStorage.setItem(k,JSON.stringify(bundle.tracker[k])));
        }
        alert("✅ Import réussi ! Données remplacées.");
      }
      loadTrackerMonth();
      input.value="";
      render();
    }catch(err){
      alert("❌ Erreur lors de l'import : "+err.message+"\nVérifie que le fichier est bien un backup Trialectique.");
    }
  };
  reader.readAsText(file);
}

function getCatInfo(key){return PROJET_CATS.find(c=>c.key===key)||PROJET_CATS[4];}
function getStatutInfo(key){return PROJET_STATUTS.find(s=>s.key===key)||PROJET_STATUTS[0];}

function projetCycleStatut(id){
  const p=state.projets.find(x=>x.id===id);if(!p)return;
  const keys=PROJET_STATUTS.map(s=>s.key);
  const idx=keys.indexOf(p.statut);
  p.statut=keys[(idx+1)%keys.length];
  saveProjets();render();
}

function projetDelete(id){
  if(!confirm("Supprimer ce projet ?"))return;
  state.projets=state.projets.filter(x=>x.id!==id);
  state.projetDetail=null;saveProjets();render();
}

function projetSave(){
  const get=id=>document.getElementById(id)?.value||"";
  const data={titre:get("pj_titre"),desc:get("pj_desc"),cat:get("pj_cat"),statut:get("pj_statut"),priorite:get("pj_priorite"),lien:get("pj_lien")};
  if(!data.titre.trim()){alert("Le titre est obligatoire.");return;}
  if(state.projetEdit){
    const idx=state.projets.findIndex(x=>x.id===state.projetEdit);
    if(idx>=0)state.projets[idx]={...state.projets[idx],...data};
    state.projetDetail=state.projetEdit;
  }else{
    const newId=Date.now();
    state.projets.unshift({id:newId,...data});
    state.projetDetail=newId;
  }
  state.projetEdit=null;saveProjets();render();
}

// Helper: find TCC sessions linked to a project
function getLinkedSessions(p){
  const titre=p.titre.toLowerCase();
  const desc=(p.desc||"").toLowerCase();
  const lien=(p.lien||"").toLowerCase();
  return state.records.filter(r=>{
    const pensee=(r.pensee||"").toLowerCase();
    const projet=(r.projet||"").toLowerCase();
    const note=(r.noteLibre||"").toLowerCase();
    // Match if session pensee or projet field mentions the project title/lien
    return pensee.includes(titre.substring(0,20))||
           projet.includes(titre.substring(0,20))||
           (lien&&pensee.includes(lien.substring(0,15)))||
           (lien&&projet.includes(lien.substring(0,15)));
  });
}

<div style="font-size:.875rem;color:#1e3a5f;line-height:1.8;margin-bottom:12px">→ Ouvre la cartographie et complète l'entrée associée<br>→ Lance une séance TCC dédiée à cette situation<br>→ Identifie le besoin non satisfait derrière la réaction</div>
<div style="display:flex;flex-wrap:wrap;gap:8px">
<button class="btn-sm" style="background:var(--sky);color:#fff;border-color:var(--sky)" onclick="state.projetDetail=null;state.cartoTab='situations';setView('cartographie')">🧨 Ouvrir Cartographie · Situations</button>
<button class="btn-sm" onclick="state.form=emptyForm();state.step='pensee';state.projetDetail=null;setView('new')">➕ Nouvelle séance TCC</button>
</div>`:""}
${p.cat==="construction"?`
<div style="font-size:.875rem;color:#1e3a5f;line-height:1.8;margin-bottom:12px">→ Lie ce projet à une habitude dans ton tracker<br>→ Fixe un jalon concret dans les 30 prochains jours<br>→ Écris ce que tu veux pouvoir dire de toi dans 1 an</div>
<div style="display:flex;flex-wrap:wrap;gap:8px">
<button class="btn-sm" style="background:var(--sky);color:#fff;border-color:var(--sky)" onclick="state.projetDetail=null;setView('tracker')">📅 Ouvrir le Tracker</button>
<button class="btn-sm" onclick="state.projetDetail=null;setView('carte')">🗺️ Voir ma carte de valeur</button>
<button class="btn-sm" onclick="state.form=emptyForm();state.step='pensee';state.projetDetail=null;setView('new')">➕ Nouvelle séance TCC</button>
</div>`:""}
${p.cat==="autre"?`
<div style="font-size:.875rem;color:#1e3a5f;line-height:1.8;margin-bottom:12px">→ Définis une première action concrète pour démarrer<br>→ Reviens régulièrement mesurer ta progression</div>
<div style="display:flex;flex-wrap:wrap;gap:8px">
<button class="btn-sm" style="background:var(--sky);color:#fff;border-color:var(--sky)" onclick="state.form=emptyForm();state.step='pensee';state.projetDetail=null;setView('new')">➕ Nouvelle séance TCC</button>
<button class="btn-sm" onclick="state.projetDetail=null;setView('cartographie')">🧭 Ouvrir Cartographie</button>
</div>`:""}
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
<button class="btn-sm" onclick="state.projetEdit=${p.id};render()">✏️ Modifier</button>
<button class="btn-sm" onclick="projetCycleStatut(${p.id})">🔄 Changer statut</button>
</div>
<button class="btn btn-danger mt12" onclick="projetDelete(${p.id})">🗑️ Supprimer</button>`;
  }

  // List view
  const sf=state.projetFilter;
  const cf=state.projetCatFilter;
  let filtered=state.projets;
  if(sf!=="all")filtered=filtered.filter(p=>p.statut===sf);
  if(cf!=="all")filtered=filtered.filter(p=>p.cat===cf);

  const counts={all:state.projets.length};
  PROJET_STATUTS.forEach(s=>{counts[s.key]=state.projets.filter(p=>p.statut===s.key).length;});

  const encours=counts["encours"]||0;
  const termine=counts["termine"]||0;
  const total=state.projets.length;
  const totalTCC=state.records.length;

  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
<h2 style="margin:0">🎯 Mes Projets</h2>
<button class="btn-add" onclick="state.projetEdit=0;render()">+ Nouveau</button>
</div>
<p class="sub">Tes projets de travail personnels — cognitifs, relationnels, de construction de soi.</p>

<div class="stats-grid-3" style="margin-bottom:14px">
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--sky-deeper)">${encours}</div><div class="stat-label-sm">En cours</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:#059669">${termine}</div><div class="stat-label-sm">Terminés</div></div>
<div class="stat-card-mini"><div class="stat-val-mid" style="color:var(--text3)">${totalTCC}</div><div class="stat-label-sm">Séances TCC</div></div>
</div>

<div class="projet-filter-row">
<button class="projet-filter ${sf==="all"?"projet-filter-on":""}" onclick="state.projetFilter='all';render()">Tous (${counts.all})</button>
${PROJET_STATUTS.map(s=>`<button class="projet-filter ${sf===s.key?"projet-filter-on":""}" onclick="state.projetFilter='${s.key}';render()">${s.label.split(" ").slice(1).join(" ")} (${counts[s.key]||0})</button>`).join("")}
</div>

<div class="projet-filter-row">
<button class="projet-filter ${cf==="all"?"projet-filter-on":""}" onclick="state.projetCatFilter='all';render()">Toutes catégories</button>
${PROJET_CATS.map(c=>`<button class="projet-filter ${cf===c.key?"projet-filter-on":""}" onclick="state.projetCatFilter='${c.key}';render()">${c.label}</button>`).join("")}
</div>

${filtered.length===0?`<div class="card" style="text-align:center;padding:30px"><p class="sub" style="margin:0">Aucun projet dans ce filtre.</p></div>`:""}

${filtered.map(p=>{
  const cat=getCatInfo(p.cat);
  const statut=getStatutInfo(p.statut);
  const prioColor=p.priorite==="haute"?"#dc2626":p.priorite==="moyenne"?"#d97706":"#059669";
  const linked=getLinkedSessions(p);
  const tccBadge=linked.length>0
    ?`<span style="display:inline-flex;align-items:center;gap:3px;background:#d1fae5;color:#065f46;padding:3px 9px;border-radius:99px;font-size:.7rem;font-weight:700">🧠 ${linked.length} TCC</span>`
    :`<span style="display:inline-flex;align-items:center;gap:3px;background:var(--sky-light);color:var(--sky-deeper);padding:3px 9px;border-radius:99px;font-size:.7rem;font-weight:600">🧠 0 TCC</span>`;
  return `<div class="projet-card" onclick="state.projetDetail=${p.id};render()">
<div class="projet-card-accent" style="background:${cat.accent}"></div>
<div style="padding-left:8px">
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
<span class="projet-cat-badge" style="background:${cat.bg};color:${cat.color};margin:0">${cat.label}</span>
<span style="font-size:.7rem;font-weight:700;color:${prioColor};white-space:nowrap">${p.priorite==="haute"?"🔴":p.priorite==="moyenne"?"🟡":"🟢"} ${p.priorite}</span>
</div>
<div class="projet-title">${esc(p.titre)}</div>
${p.desc?`<div class="projet-desc">${esc(p.desc.substring(0,100))}${p.desc.length>100?"…":""}</div>`:""}
<div class="projet-footer">
<button class="${statut.cls} projet-statut" onclick="event.stopPropagation();projetCycleStatut(${p.id})">${statut.label} ↻</button>
<div style="display:flex;gap:6px;align-items:center">
${tccBadge}
${p.lien?`<span class="projet-link-badge">🔗 ${esc(p.lien.substring(0,20))}</span>`:""}
</div>
</div>
</div>
</div>`;
}).join("")}

<button class="btn btn-secondary mt8" style="border-style:dashed" onclick="state.projetEdit=0;render()">+ Ajouter un projet personnalisé</button>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  const app=document.getElementById("app");
  let html="";
  if(state.view==="home")html=renderHome();
  else if(state.view==="new")html=renderNew();
  else if(state.view==="history")html=renderHistory();
  else if(state.view==="detail")html=renderDetail();
  else if(state.view==="carte")html=renderCarte();
  else if(state.view==="settings")html=renderSettings();
  else if(state.view==="dashboard")html=renderDashboard();
  else if(state.view==="tracker")html=renderTrackerView();
  else if(state.view==="cartographie")html=renderCartographie();
  else if(state.view==="projets")html=renderProjets();
  app.innerHTML=html;
  app.scrollTop=0;
}
render();
</script>
</body>
</html>
